name: Static Analysis

on:
  pull_request:
    paths:
      - "app/**/*.py"
      - "tests/**/*.py"
      - "infra/**/*.py"
      - "Taskfile.yaml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/static-analysis.yml"
  push:
    branches:
      - main
    paths:
      - "app/**/*.py"
      - "tests/**/*.py"
      - "infra/**/*.py"
      - "Taskfile.yaml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/static-analysis.yml"

permissions:
  contents: read

jobs:
  python-static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Install tooling
        run: uv sync --frozen --group dev

      - name: Run static analysis
        run: uv run --group dev task app:check
