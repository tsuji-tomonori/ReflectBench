version: '3'

vars:
  INFRA_DIR: '{{.TASKFILE_DIR}}/infra'
  DOCS_SITE_URL: ''

tasks:
  docs:autolink:
    desc: Auto-link glossary terms in all docs
    cmds:
      - python3 .opencode/skills/obsidian-doc-new/scripts/auto_link_glossary.py docs

  docs:autolink:check:
    desc: Ensure changed docs already satisfy glossary auto-link
    cmds:
      - |
        python3 - <<'PY'
        import os
        import subprocess
        import sys
        from pathlib import Path

        event_name = os.environ.get("GITHUB_EVENT_NAME", "")
        base_ref = os.environ.get("GITHUB_BASE_REF", "")
        before = os.environ.get("GITHUB_EVENT_BEFORE", "")

        def filter_docs(lines):
          out = []
          for line in lines:
            path = line.strip()
            if not path.startswith("docs/") or not path.endswith(".md"):
              continue
            if path.endswith("/README.md") or path.endswith("/TEMPLATE.md"):
              continue
            out.append(path)
          return out

        if event_name == "pull_request" and base_ref:
          subprocess.run(["git", "fetch", "origin", base_ref, "--depth", "1"], check=True)
          diff_range = f"origin/{base_ref}...HEAD"
          out = subprocess.check_output(["git", "diff", "--name-only", diff_range], text=True)
          changed = filter_docs(out.splitlines())
        elif before and before != "0000000000000000000000000000000000000000":
          diff_range = f"{before}...HEAD"
          out = subprocess.check_output(["git", "diff", "--name-only", diff_range], text=True)
          changed = filter_docs(out.splitlines())
        elif event_name == "push" and before == "0000000000000000000000000000000000000000":
          all_docs = subprocess.check_output(["git", "ls-files", "docs"], text=True)
          changed = filter_docs(all_docs.splitlines())
        else:
          out = subprocess.check_output(["git", "diff", "--name-only", "--", "docs"], text=True)
          changed = filter_docs(out.splitlines())

        if not changed:
          print("No changed docs markdown files. Skipping auto-link check.")
          sys.exit(0)

        target_files = sorted(set(changed))
        before_content = {p: Path(p).read_text(encoding="utf-8") for p in target_files}
        subprocess.run([
          "python3",
          ".opencode/skills/obsidian-doc-new/scripts/auto_link_glossary.py",
          *target_files,
        ], check=True)

        changed_by_autolink = []
        for p in target_files:
          after = Path(p).read_text(encoding="utf-8")
          if after != before_content[p]:
            changed_by_autolink.append(p)

        if changed_by_autolink:
          print("Glossary links are not normalized. Run auto-link before commit:")
          for p in changed_by_autolink:
            print(f"- {p}")
          sys.exit(1)
        PY

  docs:check:
    desc: Validate docs frontmatter and wiki links
    cmds:
      - python3 .opencode/skills/obsidian-doc-check/scripts/validate_vault.py --docs-root docs --report reports/doc_check.md

  docs:check:changed:
    desc: Validate changed docs frontmatter and wiki links
    cmds:
      - |
        python3 - <<'PY'
        import os
        import subprocess
        import sys

        event_name = os.environ.get("GITHUB_EVENT_NAME", "")
        base_ref = os.environ.get("GITHUB_BASE_REF", "")
        before = os.environ.get("GITHUB_EVENT_BEFORE", "")

        def filter_docs(lines):
          out = []
          for line in lines:
            path = line.strip()
            if not path.startswith("docs/") or not path.endswith(".md"):
              continue
            if path.endswith("/README.md") or path.endswith("/TEMPLATE.md"):
              continue
            out.append(path)
          return out

        if event_name == "pull_request" and base_ref:
          subprocess.run(["git", "fetch", "origin", base_ref, "--depth", "1"], check=True)
          diff_range = f"origin/{base_ref}...HEAD"
          out = subprocess.check_output(["git", "diff", "--name-only", diff_range], text=True)
          changed = filter_docs(out.splitlines())
        elif before and before != "0000000000000000000000000000000000000000":
          diff_range = f"{before}...HEAD"
          out = subprocess.check_output(["git", "diff", "--name-only", diff_range], text=True)
          changed = filter_docs(out.splitlines())
        elif event_name == "push" and before == "0000000000000000000000000000000000000000":
          all_docs = subprocess.check_output(["git", "ls-files", "docs"], text=True)
          changed = filter_docs(all_docs.splitlines())
        else:
          out = subprocess.check_output(["git", "diff", "--name-only", "--", "docs"], text=True)
          changed = filter_docs(out.splitlines())

        if not changed:
          print("No changed docs markdown files. Skipping validation.")
          sys.exit(0)

        subprocess.run([
          "python3",
          ".opencode/skills/obsidian-doc-check/scripts/validate_vault.py",
          "--docs-root",
          "docs",
          "--report",
          "reports/doc_check.md",
          "--targets",
          *sorted(set(changed)),
        ], check=True)
        PY

  docs:guard:
    desc: Run docs auto-link and validation
    cmds:
      - task docs:autolink:check
      - task docs:check:changed

  infra:deploy:ci:
    desc: Placeholder deploy task for CI/CD skeleton
    cmds:
      - |
        bash -lc 'if [ ! -d "{{.INFRA_DIR}}" ]; then
          echo "INFRA_DIR not found; skipping deploy in skeleton mode."
          exit 0
        fi
        echo "INFRA_DIR exists but deploy task is not implemented yet."
        exit 1'

  docs:verify:
    desc: Verify deployed docs top page (optional DOCS_SITE_URL)
    cmds:
      - |
        bash -lc 'if [ -z "{{.DOCS_SITE_URL}}" ]; then
          echo "DOCS_SITE_URL is empty. Skip HTTP verification."
          exit 0
        fi
        curl -fsSL "{{.DOCS_SITE_URL}}/" > /dev/null'

  docs:deploy:ci:
    desc: Run docs deploy chain in CI (skeleton)
    cmds:
      - task docs:guard
      - task infra:deploy:ci
      - task docs:verify
